# ---- HTTP ----
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# ---- CORS (frontend Angular) ----
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition

# ---- Datasource (PostgreSQL) ----
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/worldcup}
quarkus.datasource.jdbc.max-size=16

# ---- Hibernate ORM ----
# El esquema lo gestiona Flyway; Hibernate no genera nada (Quarkus 3.17).
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ---- Flyway ----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

# ---- App config ----
# Proveedor de datos de fútbol: mock | external
worldcup.data-provider=${DATA_PROVIDER:external}
# Recalcular ranking automáticamente al iniciar
worldcup.recalculate-on-start=true

# REST Client - API Football
football-api/mp-rest/url=https://v3.football.api-sports.io
quarkus.rest-client."football-api".logging.scope=request-response
quarkus.rest-client."football-api".logging.body-limit=1024
# No pongas tu key real aquí en el código fuente de forma permanente.
# Úsala vía variable de entorno o reemplázala temporalmente para la prueba.
football.api.key=${FOOTBALL_API_KEY:3e67aea4907efa1251ad1017ba936c3e}

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.worldcup".level=DEBUG
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.path=${LOG_PATH:./worldcup-predictor.log}
quarkus.log.file.enabled=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} [%c{1}.jar] [%t] %-5p (%M [%C:%L]) - %s%e%n
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} [%c{1}.jar] [%t] %-5p (%M [%C:%L]) - %s%e%n
quarkus.console.color=true
