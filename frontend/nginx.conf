# nginx del frontend: sirve la SPA Angular (hash routing) y hace reverse-proxy del
# backend Quarkus, que cuelga de su contexto /worldcup-service.
# Se copia a /etc/nginx/conf.d/default.conf (ver Dockerfile).

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    client_max_body_size 5m;
    proxy_read_timeout 300;
    proxy_connect_timeout 60;
    proxy_send_timeout 300;

    # Healthcheck liviano (lo usa el healthcheck del contenedor y el nginx-proxy).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy al backend bajo su contexto /worldcup-service.
    # Se usa resolver + variable para resolver el DNS de Docker en runtime
    # (evita que nginx falle al arrancar si el backend aún no está listo).
    location /worldcup-service/ {
        resolver 127.0.0.11 valid=30s;
        set $worldcup_backend "worldcup-backend:8080";
        proxy_pass http://$worldcup_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control no-store;
    }

    # SPA Angular (hash routing). Todo lo desconocido cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
