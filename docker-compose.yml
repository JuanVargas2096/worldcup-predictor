services:
  db:
    image: postgres:16-alpine
    container_name: worldcup-db
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - worldcup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: worldcup-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/worldcup
      DB_USERNAME: worldcup
      DB_PASSWORD: worldcup
      DATA_PROVIDER: mock
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: worldcup-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  worldcup_pgdata:
