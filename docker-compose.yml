# World Cup Predictor 2026 - stack completo (db + backend + frontend).
# Build local:   ./docker-compose.sh   (o: docker compose up --build -d)
# Push registry: docker compose build && docker compose push
# Deploy:        docker compose pull && docker compose up -d
#
# Variables configurables vía archivo .env (ver .env.example).

services:
  db:
    image: postgres:16-alpine
    container_name: worldcup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-worldcup}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worldcup}
      POSTGRES_DB: ${DB_NAME:-worldcup}
    networks:
      - ranger
    expose:
      - "5432"
    volumes:
      - worldcup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-worldcup} -d ${DB_NAME:-worldcup}" ]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    image: ${REGISTRY:-registry.mrvargas.net}/worldcup/backend:${TAG:-latest}
    build:
      context: ./backend
    container_name: worldcup-backend
    restart: unless-stopped
    networks:
      - ranger
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-worldcup}
      DB_USERNAME: ${DB_USERNAME:-worldcup}
      DB_PASSWORD: ${DB_PASSWORD:-worldcup}
      # mock = siembra rápida al arranque; el cron importa datos reales cada 6h.
      DATA_PROVIDER: ${DATA_PROVIDER:-mock}
      # Sin key real -> la app funciona con datos simulados (no falla).
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-NO_KEY}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${REGISTRY:-registry.mrvargas.net}/worldcup/frontend:${TAG:-latest}
    build:
      context: ./frontend
    networks:
      - ranger
    environment:
      LETSENCRYPT_HOST: ${PUBLIC_HOST:-worldcup-predictions.mrvargas.net}
      VIRTUAL_HOST: ${PUBLIC_HOST:-worldcup-predictions.mrvargas.net}
      VIRTUAL_PORT: "80"
    container_name: worldcup-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  worldcup_pgdata:

networks:
  ranger:
    external: true
