name: Build & Push to registry.mrvargas.net

# Construye las imágenes de backend y frontend y las publica en el registry propio.
#
# REQUIERE configurar dos secrets en el repo (Settings > Secrets and variables > Actions):
#   REGISTRY_USERNAME = juan.vargas
#   REGISTRY_PASSWORD = (tu password del registry)
# NUNCA pongas estas credenciales en el código; solo como secrets.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: registry.mrvargas.net
  BACKEND_IMAGE: registry.mrvargas.net/worldcup/backend
  FRONTEND_IMAGE: registry.mrvargas.net/worldcup/frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry.mrvargas.net
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
